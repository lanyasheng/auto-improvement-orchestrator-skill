name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8
      - name: Lint lib/
        run: flake8 lib/ --max-line-length=120
      - name: Lint all skill scripts and interfaces
        run: |
          for dir in skills/*/scripts/ skills/*/interfaces/; do
            [ -d "$dir" ] || continue
            echo "=== Linting $dir ==="
            flake8 "$dir" --max-line-length=120
          done

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run all tests
        run: python -m pytest skills/ -v --tb=short
      - name: Verify mock elimination
        run: |
          echo "Checking for hardcoded mock scores..."
          ! grep -rn "random\.uniform" skills/*/scripts/*.py skills/*/interfaces/*.py || echo "::warning::Found random.uniform usage"
          if grep -rn '"score": 0.85' skills/*/scripts/*.py; then
            echo "::warning::Found hardcoded score 0.85"
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for secrets
        run: |
          ! grep -RniE '(api[_-]?key|token|secret|password|BEGIN [A-Z ]*PRIVATE KEY|sk-[A-Za-z0-9]{20,})' \
            --include='*.py' --include='*.md' --include='*.yml' . \
            || echo "::warning::Potential secrets found"
